<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrantChecker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f5f5;
            color: #333;
            line-height: 1.6;
        }

        .container {
            max-width: 860px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        h1 {
            font-size: 1.6rem;
            margin-bottom: 24px;
            color: #1a1a1a;
        }

        textarea {
            width: 100%;
            height: 400px;
            padding: 16px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 0.95rem;
            font-family: inherit;
            resize: vertical;
            background: #fff;
        }

        textarea:focus {
            outline: none;
            border-color: #4a90d9;
            box-shadow: 0 0 0 2px rgba(74, 144, 217, 0.2);
        }

        button {
            margin-top: 16px;
            padding: 12px 32px;
            font-size: 1rem;
            font-weight: 600;
            color: #fff;
            background: #4a90d9;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover { background: #3a7bc8; }
        button:disabled { background: #a0a0a0; cursor: not-allowed; }

        .loader {
            display: none;
            margin: 24px 0;
            text-align: center;
            color: #666;
        }

        .loader.active { display: block; }

        .spinner {
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 3px solid #ddd;
            border-top-color: #4a90d9;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        #results { margin-top: 32px; }

        .section {
            margin-bottom: 20px;
            border-radius: 8px;
            overflow: hidden;
        }

        .section-header {
            padding: 12px 16px;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .section-body { background: #fff; }

        .section-item {
            padding: 12px 16px;
            border-top: 1px solid rgba(0,0,0,0.06);
        }

        .section-item:first-child { border-top: none; }

        .item-quote {
            font-style: italic;
            color: #555;
            margin-bottom: 4px;
        }

        .item-issue { margin-bottom: 4px; }

        .item-recommendation {
            color: #2a6496;
            font-size: 0.9rem;
        }

        .section.critical .section-header  { background: #f8d7da; color: #721c24; }
        .section.significant .section-header { background: #fff3cd; color: #856404; }
        .section.minor .section-header      { background: #d1ecf1; color: #0c5460; }
        .section.confirmed .section-header  { background: #d4edda; color: #155724; }
        .section.manual .section-header     { background: #e2e3e5; color: #383d41; }

        .empty-msg {
            padding: 12px 16px;
            color: #999;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>GrantChecker &mdash; проверка грантовой заявки</h1>

        <textarea id="input" placeholder="Вставьте текст раздела заявки для проверки"></textarea>
        <button id="btn" onclick="runCheck()">Проверить</button>

        <div class="loader" id="loader">
            <span class="spinner"></span> Проверяем текст, это может занять около минуты...
        </div>

        <div id="results"></div>
    </div>

    <script>
        async function runCheck() {
            const text = document.getElementById('input').value.trim();
            if (!text) return;

            const btn = document.getElementById('btn');
            const loader = document.getElementById('loader');
            const results = document.getElementById('results');

            btn.disabled = true;
            loader.classList.add('active');
            results.innerHTML = '';

            try {
                const resp = await fetch('/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text })
                });

                if (!resp.ok) throw new Error('Server error: ' + resp.status);

                const data = await resp.json();
                renderResults(data);
            } catch (e) {
                results.innerHTML = '<p style="color:red;">Ошибка: ' + escapeHtml(e.message) + '</p>';
            } finally {
                btn.disabled = false;
                loader.classList.remove('active');
            }
        }

        function escapeHtml(str) {
            const d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }

        function renderResults(data) {
            const sections = [
                { key: 'critical',    cls: 'critical',    title: '\uD83D\uDD34 Критические ошибки' },
                { key: 'significant', cls: 'significant', title: '\uD83D\uDFE1 Существенные замечания' },
                { key: 'minor',       cls: 'minor',       title: '\uD83D\uDD35 Незначительные замечания' },
                { key: 'confirmed',   cls: 'confirmed',   title: '\u2705 Подтверждённые факты' },
                { key: 'needs_manual', cls: 'manual',     title: '\uD83D\uDD0D Требует ручной проверки' }
            ];

            const container = document.getElementById('results');
            let html = '';

            for (const sec of sections) {
                const items = data[sec.key] || [];
                html += '<div class="section ' + sec.cls + '">';
                html += '<div class="section-header">' + sec.title + ' (' + items.length + ')</div>';
                html += '<div class="section-body">';

                if (items.length === 0) {
                    html += '<div class="empty-msg">Нет замечаний</div>';
                } else {
                    for (const item of items) {
                        html += '<div class="section-item">';
                        if (item.quote) {
                            html += '<div class="item-quote">&laquo;' + escapeHtml(item.quote) + '&raquo;</div>';
                        }
                        if (item.issue) {
                            html += '<div class="item-issue">' + escapeHtml(item.issue) + '</div>';
                        }
                        if (item.recommendation) {
                            html += '<div class="item-recommendation">Рекомендация: ' + escapeHtml(item.recommendation) + '</div>';
                        }
                        html += '</div>';
                    }
                }

                html += '</div></div>';
            }

            container.innerHTML = html;
        }
    </script>
</body>
</html>
